name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate deploy directory
        run: |
          errors=0
          for f in index.html style.css script.js; do
            if [ -f "$f" ]; then
              echo "  ✅ $f found"
            else
              echo "  ❌ $f MISSING"
              errors=1
            fi
          done
          [ "$errors" = "0" ] || { echo "FATAL: required files missing"; exit 1; }
          echo "All required files present at repo root"

  deploy_surge:
    needs: [validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Deploy to Surge
        run: npx surge --project ./ --domain eng-abdelmoneim-cv.surge.sh
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}

  deploy_github_pages:
    needs: [validate]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages

  deploy_cloudflare:
    needs: [validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy ./ --project-name=eng-abdelmoneim-cv

  verify:
    needs: [deploy_surge, deploy_github_pages, deploy_cloudflare]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all deployments return HTTP 200
        run: |
          urls=(
            "https://eng-abdelmoneim-cv.surge.sh"
            "https://secularway.github.io/abdelmoneim-farouq-cv/"
            "https://eng-abdelmoneim-cv.pages.dev"
            "https://eng-abdelmoneim-farouq.com"
          )
          failed=0
          for url in "${urls[@]}"; do
            echo ""
            echo "═══ Checking: $url ═══"
            http_code=""
            for i in $(seq 1 6); do
              http_code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$url" 2>/dev/null || echo "000")
              if [ "$http_code" = "200" ]; then
                echo "  ✅ HTTP 200 (attempt $i/6)"
                break
              fi
              echo "  ⏳ attempt $i/6 — HTTP $http_code, waiting 10s..."
              sleep 10
            done
            if [ "$http_code" != "200" ]; then
              echo "  ❌ FAILED after 6 attempts (last HTTP $http_code)"
              failed=1
            fi
          done
          echo ""
          if [ "$failed" = "1" ]; then
            echo "❌ One or more deployments failed verification"
            exit 1
          fi
          echo "✅ All deployments verified successfully"
